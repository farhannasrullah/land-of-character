<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Firebase Leaderboard</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body>

  <div class="card">
    <h1>Realtime Firebase Leaderboard</h1>
    <p class="subtitle">Data diambil langsung dari Firebase Realtime Database.</p>

    <div class="section">
      <h3>Leaderboard</h3>
      <div class="table-wrap">
        <table id="leaderboardTable">
          <thead>
            <tr>
              <th>Rank</th>
              <th>User</th>
              <th>RP Name</th>
              <th>Quiz</th>
              <th>Level</th>
              <th>Best Score</th>
              <th>Coins</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="8">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <h3>Raw JSON</h3>
      <pre id="jsonOutput">Loading...</pre>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
